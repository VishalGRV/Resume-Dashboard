name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    name: Test and build
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/resume_dashboard?schema=public
      AUTH_SECRET: ci-demo-secret
      NEXTAUTH_SECRET: ci-demo-secret
      NEXTAUTH_URL: http://localhost:3000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Run TypeScript type check
        run: pnpm typecheck

      - name: Run Vitest tests
        run: pnpm test:ci

      - name: Upload Vitest test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-test-report
          path: reports/vitest-results.xml

      - name: Build Next.js application
        run: pnpm build
